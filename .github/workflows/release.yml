# Fichier à placer dans : .github/workflows/release.yml
#
# Déclenchement : à chaque push d'un tag de la forme v* (ex: v1.0.0)
#
# Ce workflow :
#   1. Build l'app sur Windows (seul OS supporté pour Squirrel)
#   2. Publie l'installateur .exe sur GitHub Releases
#
# Prérequis :
#   - Ajouter un secret GH_TOKEN dans Settings > Secrets > Actions
#   - Le token doit avoir la permission "repo" (Contents: write)

name: Build & Release

on:
  push:
    tags:
      - 'v*'          # Déclenche sur v1.0.0, v2.1.3, etc.

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Installer les dépendances
        run: npm ci

      - name: Build & Publish sur GitHub Releases
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run publish
